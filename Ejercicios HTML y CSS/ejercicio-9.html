<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 9 - Página estilizada</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f4f1ea;
      color: #2f2923;
    }

    header {
      background: #2f2923;
      color: #fef7e8;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #c46a2e;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 10px;
    }

    main {
      padding: 20px;
    }

    section, article {
      background: #fff;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    footer {
      background: #355c4d;
      color: #fff;
      text-align: center;
      padding: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Página Estilizada</h1>

    <nav>
        <a href="#">Inicio</a>
        <a href="#">Noticias</a>
        <a href="#">Contacto</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Sección principal</h2>
      <article>
        <h3>Artículo</h3>
        <p>Este contenido está dentro de section y article con estilos aplicados.</p>
      </article>
    </section>
  </main>

  <footer>
    <p>Rodapé / Pie de página</p>
  </footer>
</body>
</html>
