<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejercicios 6 a 10 - Formularios</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 20px;
			line-height: 1.4;
		}

		h1 {
			margin-bottom: 16px;
		}

		h2 {
			margin-top: 24px;
			margin-bottom: 8px;
		}

		form {
			border: 1px solid #ccc;
			padding: 12px;
			max-width: 650px;
			margin-bottom: 16px;
		}

		label {
			display: block;
			margin-top: 8px;
			margin-bottom: 4px;
		}

		input,
		select,
		textarea,
		button {
			width: 100%;
			max-width: 400px;
			padding: 8px;
			box-sizing: border-box;
		}

		button {
			margin-top: 12px;
			cursor: pointer;
		}
	</style>
</head>
<body>
	<h1>Ejercicios de Formularios (6 a 10)</h1>

	<h2>6) Formulario simple</h2>
	<form action="#" method="post">
		<label for="usuario-simple">Usuario</label>
		<input type="text" id="usuario-simple" name="usuario">

		<button type="submit">Enviar</button>
	</form>

	<h2>7) Formulario con nombre y correo electrónico</h2>
	<form action="#" method="post">
		<label for="nombre">Nombre</label>
		<input type="text" id="nombre" name="nombre" required>

		<label for="correo">Correo electrónico</label>
		<input type="email" id="correo" name="correo" required>

		<button type="submit">Registrar</button>
	</form>

	<h2>8) Formulario con select de estados</h2>
	<form action="#" method="post">
		<label for="estado">Estado</label>
		<select id="estado" name="estado" required>
			<option value="">Seleccione un estado</option>
			<option value="activo">Activo</option>
			<option value="inactivo">Inactivo</option>
			<option value="pendiente">Pendiente</option>
		</select>

		<button type="submit">Guardar estado</button>
	</form>

	<h2>9) Formulario con textarea</h2>
	<form action="#" method="post">
		<label for="comentario">Comentario</label>
		<textarea id="comentario" name="comentario" rows="5" placeholder="Escribe tu comentario aquí..."></textarea>

		<button type="submit">Enviar comentario</button>
	</form>

	<h2>10) Formulario completo</h2>
	<form action="#" method="post">
		<label for="nombre-completo">Nombre completo</label>
		<input type="text" id="nombre-completo" name="nombre_completo" required>

		<label for="email-completo">Correo electrónico</label>
		<input type="email" id="email-completo" name="email_completo" required>

		<label for="telefono">Teléfono</label>
		<input type="tel" id="telefono" name="telefono" placeholder="Ej.: +598 098 307 550" required>

		<label for="estado-completo">Estado</label>
		<select id="estado-completo" name="estado_completo" required>
			<option value="">Seleccione un estado</option>
			<option value="activo">Activo</option>
			<option value="inactivo">Inactivo</option>
			<option value="pendiente">Pendiente</option>
		</select>

		<label for="mensaje">Mensaje</label>
		<textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea>

		<button type="submit">Enviar formulario</button>
	</form>
</body>
</html>
