<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4 - Rutas de Imágenes</title>
</head>
<body>
    <h1>Rutas de Imágenes</h1>

    <h2>Ruta Relativa</h2>
    <p>La imagen de abajo se carga desde una ruta relativa (carpeta <code>images/</code> local):</p>
    <img src="images/paisaje.jpg" alt="Ruta relativa" width="400">

    <h2>Ruta Absoluta (URL)</h2>
    <p>La imagen de abajo se carga desde una URL absoluta:</p>
    <img src="https://itsfoss.com/content/images/2022/12/ezgif.com-gif-maker.png" alt="Ruta absoluta" width="400">
</body>
</html>
