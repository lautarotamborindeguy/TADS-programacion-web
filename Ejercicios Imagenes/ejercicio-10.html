<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejercicio 10 - Página multimedia completa</title>
</head>
<body>
	<h1>Página multimedia completa</h1>

	<img src="images/paisaje.jpg" alt="Paisaje natural" width="400">

	<audio controls>
		<source src="audios/ringtone.mp3" type="audio/mpeg">
		Tu navegador no soporta el elemento de audio.
	</audio>

	<video width="400" controls>
		<source src="videos/video.mp4" type="video/mp4">
		Tu navegador no soporta el elemento de video.
	</video>

	<p>
		Esta página reúne distintos recursos multimedia: una imagen para el contenido visual,
		un audio para contenido sonoro y un video para mostrar información en movimiento.
	</p>
</body>
</html>
